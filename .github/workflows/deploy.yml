name: Deploy StudyHub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and test library
        run: |
          cd library && pip install -e . && pip install pytest
          pytest tests/ -v

  deploy-backend:
    needs: test-library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Create DynamoDB table
        run: |
          aws dynamodb describe-table --table-name studyhub-prod --region eu-west-1 2>/dev/null || \
          aws dynamodb create-table \
            --table-name studyhub-prod \
            --attribute-definitions AttributeName=id,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region eu-west-1

      - name: Create S3 bucket for files
        run: |
          aws s3api head-bucket --bucket studyhub-files-prod-anjaneyareddy --region eu-west-1 2>/dev/null || \
          aws s3api create-bucket \
            --bucket studyhub-files-prod-anjaneyareddy \
            --region eu-west-1 \
            --create-bucket-configuration LocationConstraint=eu-west-1

          aws s3api put-bucket-cors --bucket studyhub-files-prod-anjaneyareddy --region eu-west-1 --cors-configuration '{
            "CORSRules": [
              {
                "AllowedHeaders": ["Authorization"],
                "AllowedMethods": ["GET", "PUT", "POST"],
                "AllowedOrigins": ["*"],
                "MaxAgeSeconds": 3600
              }
            ]
          }'

      - name: Create IAM role for Lambda
        run: |
          TRUST_POLICY='{
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": { "Service": "lambda.amazonaws.com" },
                "Action": "sts:AssumeRole"
              }
            ]
          }'

          aws iam get-role --role-name studyhub-lambda-role 2>/dev/null || \
          aws iam create-role \
            --role-name studyhub-lambda-role \
            --assume-role-policy-document "$TRUST_POLICY"

      - name: Attach IAM policies
        run: |
          aws iam attach-role-policy --role-name studyhub-lambda-role --policy-arn arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess || true
          aws iam attach-role-policy --role-name studyhub-lambda-role --policy-arn arn:aws:iam::aws:policy/AmazonS3FullAccess || true
          aws iam attach-role-policy --role-name studyhub-lambda-role --policy-arn arn:aws:iam::aws:policy/AmazonSNSFullAccess || true
          aws iam attach-role-policy --role-name studyhub-lambda-role --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole || true

      - name: Create SNS topic
        run: |
          SNS_TOPIC_ARN=$(aws sns create-topic --name studyhub-notifications --region eu-west-1 --query 'TopicArn' --output text)
          echo "SNS_TOPIC_ARN=$SNS_TOPIC_ARN" >> $GITHUB_ENV

      - name: Wait for IAM propagation
        run: sleep 10

      - name: Package Lambda
        run: cd backend && zip -r ../lambda.zip lambda_function.py

      - name: Deploy Lambda function
        run: |
          ROLE_ARN=$(aws iam get-role --role-name studyhub-lambda-role --query 'Role.Arn' --output text)

          FUNCTION_EXISTS=$(aws lambda get-function --function-name studyhub-api --region eu-west-1 2>/dev/null && echo "yes" || echo "no")

          if [ "$FUNCTION_EXISTS" = "yes" ]; then
            aws lambda update-function-code \
              --function-name studyhub-api \
              --zip-file fileb://lambda.zip \
              --region eu-west-1

            aws lambda wait function-updated --function-name studyhub-api --region eu-west-1

            aws lambda update-function-configuration \
              --function-name studyhub-api \
              --runtime python3.11 \
              --memory-size 256 \
              --timeout 30 \
              --environment "Variables={DYNAMODB_TABLE=studyhub-prod,S3_BUCKET=studyhub-files-prod-anjaneyareddy,SNS_TOPIC_ARN=$SNS_TOPIC_ARN,REGION=eu-west-1,JWT_SECRET=studyhub-secret-key-2026}" \
              --region eu-west-1
          else
            aws lambda create-function \
              --function-name studyhub-api \
              --runtime python3.11 \
              --role "$ROLE_ARN" \
              --handler lambda_function.lambda_handler \
              --zip-file fileb://lambda.zip \
              --memory-size 256 \
              --timeout 30 \
              --environment "Variables={DYNAMODB_TABLE=studyhub-prod,S3_BUCKET=studyhub-files-prod-anjaneyareddy,SNS_TOPIC_ARN=$SNS_TOPIC_ARN,REGION=eu-west-1,JWT_SECRET=studyhub-secret-key-2026}" \
              --region eu-west-1
          fi

      - name: Setup API Gateway
        run: |
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='studyhub-api'].id" --output text --region eu-west-1)
          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            API_ID=$(aws apigateway create-rest-api --name studyhub-api --endpoint-configuration types=REGIONAL --query 'id' --output text --region eu-west-1)
          fi

          ROOT_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?path=='/'].id" --output text --region eu-west-1)

          PROXY_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?pathPart=='{proxy+}'].id" --output text --region eu-west-1)
          if [ -z "$PROXY_ID" ] || [ "$PROXY_ID" = "None" ]; then
            PROXY_ID=$(aws apigateway create-resource --rest-api-id $API_ID --parent-id $ROOT_ID --path-part '{proxy+}' --query 'id' --output text --region eu-west-1)
          fi

          LAMBDA_ARN=$(aws lambda get-function --function-name studyhub-api --query 'Configuration.FunctionArn' --output text --region eu-west-1)

          aws apigateway put-method --rest-api-id $API_ID --resource-id $PROXY_ID --http-method ANY --authorization-type NONE --request-parameters "method.request.path.proxy=true" --region eu-west-1 2>/dev/null || true

          aws apigateway put-integration --rest-api-id $API_ID --resource-id $PROXY_ID --http-method ANY --type AWS_PROXY --integration-http-method POST --uri "arn:aws:apigateway:eu-west-1:lambda:path/2015-03-31/functions/${LAMBDA_ARN}/invocations" --region eu-west-1

          # OPTIONS for CORS
          aws apigateway put-method --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --authorization-type NONE --region eu-west-1 2>/dev/null || true
          aws apigateway put-method-response --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --status-code 200 --response-parameters "method.response.header.Access-Control-Allow-Headers=true,method.response.header.Access-Control-Allow-Methods=true,method.response.header.Access-Control-Allow-Origin=true" --region eu-west-1 2>/dev/null || true
          aws apigateway put-integration --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --type MOCK --request-templates '{"application/json": "{\"statusCode\": 200}"}' --region eu-west-1
          aws apigateway put-integration-response --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --status-code 200 --response-parameters '{"method.response.header.Access-Control-Allow-Headers":"'"'"'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"'"'","method.response.header.Access-Control-Allow-Methods":"'"'"'GET,POST,PUT,DELETE,OPTIONS'"'"'","method.response.header.Access-Control-Allow-Origin":"'"'"'*'"'"'"}' --region eu-west-1

          # Root ANY
          aws apigateway put-method --rest-api-id $API_ID --resource-id $ROOT_ID --http-method ANY --authorization-type NONE --region eu-west-1 2>/dev/null || true
          aws apigateway put-integration --rest-api-id $API_ID --resource-id $ROOT_ID --http-method ANY --type AWS_PROXY --integration-http-method POST --uri "arn:aws:apigateway:eu-west-1:lambda:path/2015-03-31/functions/${LAMBDA_ARN}/invocations" --region eu-west-1

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws lambda add-permission --function-name studyhub-api --statement-id apigateway-access --action lambda:InvokeFunction --principal apigateway.amazonaws.com --source-arn "arn:aws:execute-api:eu-west-1:${ACCOUNT_ID}:${API_ID}/*" --region eu-west-1 2>/dev/null || true

          aws apigateway create-deployment --rest-api-id $API_ID --stage-name prod --region eu-west-1
          echo "API_URL=https://${API_ID}.execute-api.eu-west-1.amazonaws.com/prod" >> $GITHUB_ENV

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Get API URL
        run: |
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='studyhub-api'].id" --output text --region eu-west-1)
          echo "VITE_API_URL=https://${API_ID}.execute-api.eu-west-1.amazonaws.com/prod" >> $GITHUB_ENV

      - name: Build frontend
        run: cd frontend && npm install && VITE_API_URL=$VITE_API_URL npm run build

      - name: Create frontend S3 bucket
        run: |
          aws s3api head-bucket --bucket studyhub-frontend-prod-anjaneyareddy --region eu-west-1 2>/dev/null || \
          aws s3api create-bucket \
            --bucket studyhub-frontend-prod-anjaneyareddy \
            --region eu-west-1 \
            --create-bucket-configuration LocationConstraint=eu-west-1

      - name: Configure static website hosting
        run: |
          aws s3 website s3://studyhub-frontend-prod-anjaneyareddy \
            --index-document index.html \
            --error-document index.html \
            --region eu-west-1

      - name: Disable Block Public Access
        run: |
          aws s3api put-public-access-block --bucket studyhub-frontend-prod-anjaneyareddy \
            --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false" --region eu-west-1

      - name: Set bucket policy for public read
        run: |
          aws s3api put-bucket-policy --bucket studyhub-frontend-prod-anjaneyareddy --region eu-west-1 --policy '{
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "PublicReadGetObject",
                "Effect": "Allow",
                "Principal": "*",
                "Action": "s3:GetObject",
                "Resource": "arn:aws:s3:::studyhub-frontend-prod-anjaneyareddy/*"
              }
            ]
          }'

      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://studyhub-frontend-prod-anjaneyareddy --delete --region eu-west-1

      - name: Output frontend URL
        run: |
          echo "Frontend URL: http://studyhub-frontend-prod-anjaneyareddy.s3-website-eu-west-1.amazonaws.com"
